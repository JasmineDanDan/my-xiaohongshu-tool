<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款标题生成器 ✨</title>
    <!-- 引入 Tailwind CSS 库，这样我们不需要写专门的 CSS 文件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
        }
        .dopamine-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 3px solid #ff6b6b;
            box-shadow: 10px 10px 0px #ff6b6b;
        }
        .title-item {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .title-item:hover {
            transform: scale(1.02);
            border-color: #ff8787;
            background-color: #fff5f5;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-md w-full dopamine-card rounded-3xl p-8">
        <!-- 头部设计 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-pink-600 mb-2">✨ 爆款标题助手 ✨</h1>
            <p class="text-gray-500 text-sm">让你的笔记自带流量密码 💖</p>
        </div>

        <!-- 输入框区域 -->
        <div class="space-y-4">
            <input type="text" id="keyword" placeholder="输入你的关键词 (如: 减脂、穿搭)" 
                class="w-full px-6 py-4 rounded-full border-2 border-pink-200 focus:outline-none focus:border-pink-500 text-lg shadow-inner">
            
            <button onclick="generateTitles()" 
                class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-full text-xl shadow-lg transform active:scale-95 transition-all">
                一键变爆款 🔥
            </button>
        </div>

        <!-- 结果展示区域 -->
        <div id="result" class="mt-8 space-y-3 hidden">
            <p class="text-pink-600 font-bold mb-2 ml-2">为您生成：</p>
            <div id="titleList" class="space-y-3">
                <!-- 标题会显示在这里 -->
            </div>
            <p class="text-center text-xs text-gray-400 mt-4">点击标题即可快速复制</p>
        </div>
    </div>

    <!-- 逻辑脚本 -->
    <script>
        const templates = [
            "妈耶！这个[KEYWORD]我不允许还有人不知道！😭",
            "谁懂啊... 真的被这个[KEYWORD]狠狠惊艳到了✨",
            "救命！这也太好用了吧！关于[KEYWORD]的保姆级攻略🔥",
            "后悔没早看！[KEYWORD]新手必看，避坑指南来啦💔",
            "我的天！这绝对是[KEYWORD]的天花板！强烈安利💖",
            "私藏很久的[KEYWORD]小技巧，今天全部分享出来🤣",
            "答应我！去搜这个[KEYWORD]好吗？真的绝绝子！🌈",
            "大数据请把我推给想学[KEYWORD]的姐妹们！🙏",
            "这是什么神仙[KEYWORD]啊！好用到哭，闭眼冲！💸",
            "深度测评！[KEYWORD]到底值不值得？看这篇就够了🤔"
        ];

        function generateTitles() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) {
                alert('请先输入关键词哦～');
                return;
            }

            // 随机选5个模版
            const shuffled = templates.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            const listContainer = document.getElementById('titleList');
            const resultDiv = document.getElementById('result');
            
            listContainer.innerHTML = '';
            resultDiv.classList.remove('hidden');

            selected.forEach(temp => {
                const title = temp.replace('[KEYWORD]', keyword);
                const div = document.createElement('div');
                div.className = 'title-item p-4 rounded-2xl bg-white shadow-sm cursor-pointer text-gray-700 font-medium text-base';
                div.innerText = title;
                div.onclick = () => copyToClipboard(title);
                listContainer.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('复制成功！快去发布吧 ✨');
            });
        }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

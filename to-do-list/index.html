<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日待办清单</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (让浏览器能直接读懂 JSX 语法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }
    /* 隐藏滚动条但保留滚动功能 */
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 2px; }
    /* 垃圾桶悬停显示 */
    .task-row .trash-btn { opacity: 0; transition: opacity 0.2s; }
    .task-row:hover .trash-btn { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const STORAGE_KEY = "today_todos";

    const DEFAULT_TASKS = [
      { id: 1, text: "喝八杯水，保持活力 💧", done: false },
      { id: 2, text: "整理一下桌面，清爽开始", done: true },
    ];

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return DEFAULT_TASKS;
    }

    function saveTasks(tasks) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (_) {}
    }

    // ---- 图标组件 ----
    const CheckIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}>
        <polyline points="20 6 9 17 4 12" />
      </svg>
    );

    const TrashIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
        strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}>
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
      </svg>
    );

    const LeafIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"
        strokeLinecap="round" strokeLinejoin="round" style={{width:20,height:20}}>
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z" />
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" />
      </svg>
    );

    // ---- 主应用 ----
    function TodoApp() {
      const [tasks, setTasks] = useState(() => loadTasks());
      const [input, setInput] = useState("");
      const [animatingId, setAnimatingId] = useState(null);
      const [deletingId, setDeletingId] = useState(null);
      const inputRef = useRef(null);

      useEffect(() => { saveTasks(tasks); }, [tasks]);

      const addTask = () => {
        const trimmed = input.trim();
        if (!trimmed) return;
        setTasks(prev => [{ id: Date.now(), text: trimmed, done: false }, ...prev]);
        setInput("");
        inputRef.current?.focus();
      };

      const toggleTask = (id) => {
        setAnimatingId(id);
        setTimeout(() => setAnimatingId(null), 400);
        setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };

      const deleteTask = (e, id) => {
        e.stopPropagation();
        setDeletingId(id);
        setTimeout(() => {
          setTasks(prev => prev.filter(t => t.id !== id));
          setDeletingId(null);
        }, 280);
      };

      const pending = tasks.filter(t => !t.done).length;
      const total = tasks.length;
      const progressPct = total ? ((total - pending) / total) * 100 : 0;

      return (
        <div style={{
          minHeight: "100vh",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          padding: "16px",
          background: "linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 40%, #e0f2f1 100%)"
        }}>
          {/* 装饰光晕 */}
          <div style={{
            position: "fixed", top: 0, left: 0, width: 256, height: 256,
            borderRadius: "50%", opacity: 0.2, pointerEvents: "none",
            background: "radial-gradient(circle, #a5d6a7, transparent)",
            transform: "translate(-30%, -30%)"
          }} />
          <div style={{
            position: "fixed", bottom: 0, right: 0, width: 320, height: 320,
            borderRadius: "50%", opacity: 0.2, pointerEvents: "none",
            background: "radial-gradient(circle, #80cbc4, transparent)",
            transform: "translate(30%, 30%)"
          }} />

          {/* 卡片 */}
          <div style={{
            width: "100%", maxWidth: 448, position: "relative",
            borderRadius: 24, overflow: "hidden",
            boxShadow: "0 20px 60px rgba(0,0,0,0.12)",
            background: "rgba(255,255,255,0.80)",
            backdropFilter: "blur(20px)",
            border: "1px solid rgba(165,214,167,0.4)"
          }}>

            {/* 头部 */}
            <div style={{
              padding: "32px 32px 24px",
              background: "linear-gradient(135deg, #43a047, #26a69a)"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, color: "#c8e6c9" }}>
                <LeafIcon />
                <span style={{ fontSize: 12, fontWeight: 500, letterSpacing: "0.1em", fontFamily: "Georgia, serif" }}>
                  今日清单
                </span>
              </div>
              <h1 style={{
                color: "white", fontSize: 28, fontWeight: 700,
                fontFamily: "Georgia, serif", letterSpacing: "-0.5px", lineHeight: 1.2
              }}>
                今日事，今日毕
              </h1>

              {/* 进度条 */}
              <div style={{ marginTop: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", color: "#c8e6c9", fontSize: 12, marginBottom: 6 }}>
                  <span>完成进度</span>
                  <span>{total - pending} / {total} 项</span>
                </div>
                <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.25)" }}>
                  <div style={{
                    height: "100%", borderRadius: 3,
                    width: `${progressPct}%`,
                    background: "rgba(255,255,255,0.85)",
                    transition: "width 0.7s ease"
                  }} />
                </div>
              </div>
            </div>

            {/* 输入区 */}
            <div style={{ padding: "20px 24px", borderBottom: "1px solid #e8f5e9" }}>
              <div style={{ display: "flex", gap: 8 }}>
                <input
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addTask()}
                  placeholder="写下今天要做的事…"
                  style={{
                    flex: 1, padding: "12px 16px", borderRadius: 16,
                    border: "1.5px solid #c8e6c9", outline: "none",
                    background: "#f1f8f1", color: "#2e7d32",
                    fontSize: 14, fontFamily: "sans-serif",
                    transition: "border-color 0.2s"
                  }}
                  onFocus={e => e.target.style.borderColor = "#66bb6a"}
                  onBlur={e => e.target.style.borderColor = "#c8e6c9"}
                />
                <button
                  onClick={addTask}
                  style={{
                    padding: "12px 20px", borderRadius: 16, border: "none",
                    background: "linear-gradient(135deg, #43a047, #26a69a)",
                    color: "white", fontSize: 14, fontWeight: 600,
                    cursor: "pointer", whiteSpace: "nowrap",
                    boxShadow: "0 4px 12px rgba(67,160,71,0.35)",
                    transition: "transform 0.1s"
                  }}
                  onMouseDown={e => e.currentTarget.style.transform = "scale(0.95)"}
                  onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
                >
                  记录
                </button>
              </div>
            </div>

            {/* 任务列表 */}
            <div className="task-list" style={{
              padding: "16px 24px", display: "flex", flexDirection: "column",
              gap: 12, minHeight: 120, maxHeight: 320, overflowY: "auto"
            }}>
              {tasks.length === 0 && (
                <div style={{ textAlign: "center", padding: "32px 0", color: "#a5d6a7", fontSize: 14 }}>
                  还没有任务，快来添加吧 🌱
                </div>
              )}
              {tasks.map(task => (
                <div
                  key={task.id}
                  className="task-row"
                  onClick={() => toggleTask(task.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: 12,
                    padding: "14px 16px", borderRadius: 16, cursor: "pointer",
                    background: task.done ? "#f1f8f0" : "white",
                    border: `1.5px solid ${task.done ? "#c8e6c9" : "#e8f5e9"}`,
                    boxShadow: task.done ? "none" : "0 2px 8px rgba(0,0,0,0.04)",
                    transform: deletingId === task.id ? "scale(0.9)" : animatingId === task.id ? "scale(0.97)" : "scale(1)",
                    opacity: deletingId === task.id ? 0 : 1,
                    transition: "all 0.28s ease"
                  }}
                >
                  {/* 圆圈/勾 */}
                  <div style={{
                    flexShrink: 0, width: 24, height: 24, borderRadius: "50%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    background: task.done ? "linear-gradient(135deg, #43a047, #26a69a)" : "transparent",
                    border: task.done ? "none" : "2px solid #a5d6a7",
                    color: "white", transition: "all 0.3s"
                  }}>
                    {task.done && <CheckIcon />}
                  </div>

                  {/* 文字 */}
                  <span style={{
                    flex: 1, fontSize: 14,
                    color: task.done ? "#9e9e9e" : "#2e7d32",
                    textDecoration: task.done ? "line-through" : "none",
                    transition: "all 0.3s"
                  }}>
                    {task.text}
                  </span>

                  {/* 垃圾桶按钮 */}
                  <button
                    className="trash-btn"
                    onClick={e => deleteTask(e, task.id)}
                    title="删除任务"
                    style={{
                      flexShrink: 0, width: 28, height: 28, borderRadius: "50%",
                      border: "none", background: "transparent",
                      color: "#ef9a9a", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      transition: "background 0.2s, color 0.2s"
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = "#fce4ec"; e.currentTarget.style.color = "#e53935"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "#ef9a9a"; }}
                  >
                    <TrashIcon />
                  </button>
                </div>
              ))}
            </div>

            {/* 底部提示 */}
            <div style={{
              padding: "16px 24px", textAlign: "center",
              fontSize: 12, color: "#a5d6a7",
              borderTop: "1px solid #f1f8e9"
            }}>
              {pending === 0 && total > 0
                ? "🎉 今日任务全部完成，你真棒！"
                : `还有 ${pending} 件事等你完成 🍃`}
            </div>
          </div>
        </div>
      );
    }

    // 挂载到页面
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TodoApp />);
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
